<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBrr AniList Filter</title>
    <style>
        :root { --primary: #3e5cf4; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: var(--card-bg); width: 100%; max-width: 800px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        button { padding: 12px 24px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; }
        #copyBtn { background: #28a745; margin-top: 10px; width: 100%; display: none; }
        textarea { width: 100%; height: 250px; margin-top: 15px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 13px; background: #fafafa; box-sizing: border-box; }
        .status { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .error { color: #dc3545; background: #fff5f5; padding: 10px; border-radius: 4px; border: 1px solid #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h1>AniList ➔ AutoBrr</h1>
    <div class="input-group">
        <input type="text" id="username" placeholder="AniList Username (e.g., 'Azu')">
        <button onclick="generateFilter()">Generate</button>
    </div>
    <div id="status" class="status"></div>
    <textarea id="output" readonly placeholder="Filter will appear here..."></textarea>
    <button id="copyBtn" onclick="copyToClipboard()">Copy to Clipboard</button>
</div>

<script>
    async function generateFilter() {
        const username = document.getElementById('username').value.trim().replace('@', '');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        if (!username) return;

        status.innerText = "Querying AniList...";
        status.className = "status";
        output.value = "";
        copyBtn.style.display = "none";

        // Querying without the status filter inside GraphQL to be more robust
        const query = `
        query ($userName: String) {
          MediaListCollection(userName: $userName, type: ANIME) {
            lists {
              status
              entries {
                media {
                  title { romaji english }
                  synonyms
                }
              }
            }
          }
        }`;

        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ query, variables: { userName: username } })
            });

            const result = await response.json();

            if (result.errors) {
                const msg = result.errors[0].message;
                throw new Error(msg === "Not Found." ? "User not found. Check your AniList URL name." : msg);
            }

            const collection = result.data.MediaListCollection;
            if (!collection || !collection.lists) throw new Error("Could not retrieve lists.");

            let filterEntries = [];
            // Only look at the "CURRENT" (Watching) list
            const watchingList = collection.lists.find(l => l.status === "CURRENT");

            if (!watchingList || watchingList.entries.length === 0) {
                throw new Error("User found, but 'Watching' list is empty or private.");
            }

            watchingList.entries.forEach(entry => {
                const m = entry.media;
                const rawNames = [m.title.romaji, m.title.english, ...m.synonyms];
                
                rawNames.forEach(name => {
                    if (!name) return;
                    // Lowercase and turn commas into wildcards (AutoBrr uses commas to separate items)
                    let clean = name.toLowerCase().replace(/,/g, '?');
                    // Turn separators (:, -, (, )) into '*'
                    clean = clean.replace(/[:\-()]/g, '*');
                    // Replace spaces/dots/junk with '?'
                    clean = clean.replace(/[^a-z0-9*]/gi, '?');
                    // Clean up double wildcards
                    clean = clean.replace(/\?+/g, '?').replace(/\*+/g, '*').replace(/\?\*/g, '*').replace(/\*\?/g, '*');
                    // Trim wildcards from edges
                    clean = clean.replace(/^[?*]+|[?*]+$/g, '');
                    
                    if (clean.length > 2) filterEntries.push(`*${clean}*`);
                });
            });

            const finalFilter = [...new Set(filterEntries)].sort().join(',');
            output.value = finalFilter;
            status.innerText = `Success! Found ${watchingList.entries.length} shows (${filterEntries.length} variants).`;
            status.className = "status success";
            copyBtn.style.display = "block";

        } catch (err) {
            status.innerText = "Error: " + err.message;
            status.className = "status error";
        }
    }

    function copyToClipboard() {
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        output.select();
        navigator.clipboard.writeText(output.value);
        copyBtn.innerText = "Copied!";
        setTimeout(() => { copyBtn.innerText = "Copy to Clipboard"; }, 2000);
    }
</script>
</body>
</html>
