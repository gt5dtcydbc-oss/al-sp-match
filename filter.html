<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBrr Filter Gen</title>
    <style>
        :root { --primary: #3e5cf4; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: var(--card-bg); width: 100%; max-width: 850px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        button { padding: 12px 24px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; }
        #copyBtn { background: #28a745; margin-top: 10px; width: 100%; display: none; }
        textarea { width: 100%; height: 350px; margin-top: 15px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 13px; background: #fafafa; box-sizing: border-box; }
        .status { font-size: 13px; font-weight: 600; margin-bottom: 10px; min-height: 20px; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

<div class="card">
    <h1>AniList ➔ AutoBrr</h1>
    <div class="input-group">
        <input type="text" id="username" placeholder="AniList Username">
        <button onclick="generateFilter()">Generate</button>
    </div>
    <div id="status" class="status"></div>
    <textarea id="output" readonly placeholder="Filter will appear here..."></textarea>
    <button id="copyBtn" onclick="copyToClipboard()">Copy to Clipboard</button>
</div>

<script>
    // 1. Logic to filter out non-English-friendly synonyms
    const isEnglishFriendly = (str) => /^[\x00-\x7F]*$/.test(str);

    async function generateFilter() {
        const username = document.getElementById('username').value.trim();
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        if (!username) return;

        status.innerText = "Querying AniList...";
        status.classList.remove('error');
        output.value = "";
        copyBtn.style.display = "none";

        const query = `
        query ($name: String) {
          MediaListCollection(userName: $name, type: ANIME, status: CURRENT) {
            lists {
              entries {
                media {
                  title { romaji english native }
                  synonyms
                }
              }
            }
          }
        }`;

        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ query, variables: { name: username } })
            });

            const result = await response.json();

            if (result.errors) throw new Error(result.errors[0].message);
            if (!result.data || !result.data.MediaListCollection) throw new Error("User not found or list is private.");

            const lists = result.data.MediaListCollection.lists;
            let filterEntries = [];

            lists.forEach(list => {
                list.entries.forEach(entry => {
                    const m = entry.media;
                    
                    // 2. Select Core Titles + English-Friendly Synonyms
                    const coreTitles = [m.title.romaji, m.title.english, m.title.native].filter(Boolean);
                    const cleanSynonyms = m.synonyms.filter(s => isEnglishFriendly(s));
                    let allPossibleTitles = [...new Set([...coreTitles, ...cleanSynonyms])];

                    allPossibleTitles.forEach(name => {
                        // Skip very short ASCII tags like 'S2' to prevent false matches
                        if (name.length < 3 && !/[\u3040-\u30ff\u4e00-\u9faf]/.test(name)) return;

                        let clean = name.toLowerCase();

                        // 3. FUZZY SEASON LOGIC
                        // If title contains "Season 4", add a variant for "4th Season"
                        let variants = [clean];
                        if (clean.includes('season ')) {
                            variants.push(clean.replace(/season (\d+)/g, '$1th season'));
                            variants.push(clean.replace(/season (\d+)/g, '$1st season'));
                            variants.push(clean.replace(/season (\d+)/g, '$1nd season'));
                            variants.push(clean.replace(/season (\d+)/g, '$1rd season'));
                        }

                        variants.forEach(v => {
                            // Replace symbols with '?'
                            let pattern = v.replace(/[^a-z0-9\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/gi, '?');
                            pattern = pattern.replace(/\?+/g, '?').replace(/^\?+|\?+$/g, '');
                            
                            if (pattern.length > 2) {
                                filterEntries.push(`*${pattern}*`);
                            }
                        });
                    });
                });
            });

            if (filterEntries.length === 0) {
                status.innerText = "No titles found in 'Watching' list.";
                return;
            }

            // Remove duplicates and join with commas
            output.value = [...new Set(filterEntries)].sort().join(',');
            status.innerText = `Generated ${filterEntries.length} patterns for your season!`;
            copyBtn.style.display = "block";

        } catch (err) {
            status.innerText = "Error: " + err.message;
            status.classList.add('error');
        }
    }

    function copyToClipboard() {
        const output = document.getElementById('output');
        output.select();
        navigator.clipboard.writeText(output.value);
        document.getElementById('copyBtn').innerText = "Copied!";
        setTimeout(() => { document.getElementById('copyBtn').innerText = "Copy to Clipboard"; }, 2000);
    }
</script>
</body>
</html>
