<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airing Board</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1017;
      --panel: #171d2e;
      --panel-2: #1d2438;
      --line: #27314c;
      --text: #edf2ff;
      --muted: #a8b2cf;
      --accent: #7db7ff;
      --accent-2: #9ce8ff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(125, 183, 255, 0.14), transparent 28%),
        radial-gradient(circle at bottom left, rgba(156, 232, 255, 0.10), transparent 24%),
        linear-gradient(180deg, #0b0e15 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1540px;
      margin: 0 auto;
      padding: 24px 18px 42px;
    }

    .title {
      margin: 0 0 16px;
      font-size: clamp(1.5rem, 2vw, 2.2rem);
      letter-spacing: -0.03em;
    }

    .panel {
      background: rgba(23, 29, 46, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: grid;
      gap: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .controls-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      align-items: end;
    }

    .field { display: grid; gap: 8px; }
    .field label { color: var(--muted); font-size: 0.92rem; }

    input, textarea, button { font: inherit; }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      outline: none;
    }

    input[type="text"] {

      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .button-row { display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      border: 0;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 0.16s ease, opacity 0.2s ease;
    }

    button.primary {
      color: #08111d;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
    }

    button.secondary {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    button.danger {
      color: #ffdede;
      background: rgba(255, 120, 120, 0.12);
      border: 1px solid rgba(255, 120, 120, 0.25);
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.7; cursor: wait; transform: none; }

    details {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 10px;
      user-select: none;
    }

    .message {
      display: none;
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid transparent;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message.info {
      display: block;
      background: rgba(125, 183, 255, 0.12);
      border-color: rgba(125, 183, 255, 0.28);
    }

    .message.error {
      display: block;
      background: rgba(255, 120, 120, 0.12);
      border-color: rgba(255, 120, 120, 0.28);
      color: #ffd6d6;
    }

    .summary {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 16px;
    }

    .summary-card { padding: 14px 16px; }
    .summary-label { color: var(--muted); font-size: 0.86rem; margin-bottom: 6px; }
    .summary-value { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }

    .board {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      align-items: start;
    }

    .day-column { padding: 14px; }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .day-name { font-size: 1.02rem; font-weight: 800; }
    .day-count { font-size: 0.82rem; color: var(--muted); }

    .time-group { display: grid; gap: 8px; margin-bottom: 14px; }

    .time-pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(125, 183, 255, 0.11);
      border: 1px solid rgba(125, 183, 255, 0.16);
      color: #dcebff;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .entry-list { display: grid; gap: 8px; }

    .entry {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 10px;
      padding: 9px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(36, 45, 69, 0.95), rgba(28, 35, 53, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .thumb {
      width: 38px;
      height: 54px;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .thumb img { display: block; width: 100%; height: 100%; object-fit: cover; }

    .entry-body { min-width: 0; display: grid; gap: 4px; align-content: start; }

    .entry-title {
      font-size: 0.9rem;
      line-height: 1.3;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-title a { color: var(--text); text-decoration: none; }
    .entry-title a:hover { color: var(--accent-2); }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.35;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.71rem;
      font-weight: 700;
    }

    .chip.rss {
      background: rgba(140, 226, 174, 0.11);
      border-color: rgba(140, 226, 174, 0.18);
      color: #d8ffe7;
    }

    .chip.cache {
      background: rgba(173, 171, 255, 0.12);
      border-color: rgba(173, 171, 255, 0.18);
      color: #e7e5ff;
    }

    .chip.fallback {
      background: rgba(125, 183, 255, 0.11);
      border-color: rgba(125, 183, 255, 0.18);
      color: #dcebff;
    }

    .footer { margin-top: 14px; color: var(--muted); font-size: 0.86rem; line-height: 1.45; }

    @media (max-width: 980px) {
      .controls-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .wrap { padding: 18px 12px 36px; }
      .controls { padding: 14px; }
      .board { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Airing Board</h1>

    <section class="panel controls">
      <div class="controls-grid">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" value="user" spellcheck="false" autocomplete="off" />
        </div>


        <div class="button-row">
          <button id="loadBtn" class="primary" type="button">Load</button>
          <button id="clearMemoryBtn" class="danger" type="button">Clear memory</button>
        </div>
      </div>

      <details>
        <summary>Config</summary>
        <div class="controls-grid">
          <div class="field">
            <label for="rssUrl">SubsPlease RSS URL</label>
            <input id="rssUrl" type="text" spellcheck="false" value="https://subsplease.org/rss/?r=1080" autocomplete="off" />
          </div>

          <div class="field">
            <label for="rssProxyTemplate">SubsPlease proxy</label>
            <input id="rssProxyTemplate" type="text" spellcheck="false" placeholder="https://your-proxy.example/fetch?url=%URL%" autocomplete="off" />
          </div>

        </div>

        <div class="field">
          <label for="manualScheduleText">Manual schedule</label>
          <textarea id="manualScheduleText" spellcheck="false" placeholder="Monday&#10;Show Title	16:00&#10;Another Show	18:30"></textarea>
        </div>
      </details>
    </section>

    <div id="message" class="message"></div>
    <section id="summary" class="summary"></section>
    <section id="board" class="board"></section>
    <div id="footer" class="footer"></div>
  </div>

  <script>
    const ENDPOINT = "https://graphql.anilist.co";
    const SLOT_CACHE_KEY = "anilist-subsplease-slot-cache-v2";
    const WEEKDAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const DEFAULT_TIMEZONE = "Europe/Berlin";

    const TITLE_STOPWORDS = new Set([
      "a","an","the","and","of","to","in","on",
      "no","wo","ga","wa","ni","de","na","e","yo","mo",
      "season","part","cour","movie","tv","ova","ona",
      "s","s1","s2","s3","s4","s5","s6",
      "1st","2nd","3rd","4th","5th","6th",
      "1","2","3","4","5","6"
    ]);

    const MATCH_OVERRIDES = {
      "Dan Da Dan Season 2": "Dandadan",
      "Frieren: Beyond Journey's End Season 2": "Sousou no Frieren S2",
      "Fire Force Season 3": "Enen no Shouboutai S3",
      "Hell's Paradise Season 2": "Jigokuraku",
      "The Apothecary Diaries Season 2": "Kusuriya no Hitorigoto S2"
    };

    const QUERY = `
      query ($userName: String!) {
        MediaListCollection(userName: $userName, type: ANIME, status: CURRENT) {
          lists {
            entries {
              media {
                id
                siteUrl
                format
                coverImage { large medium }
                title { userPreferred english romaji native }
                synonyms
                nextAiringEpisode { episode airingAt }
              }
            }
          }
        }
      }
    `;

    const els = {
      username: document.getElementById("username"),
      rssUrl: document.getElementById("rssUrl"),
      rssProxyTemplate: document.getElementById("rssProxyTemplate"),
      manualScheduleText: document.getElementById("manualScheduleText"),
      loadBtn: document.getElementById("loadBtn"),
      clearMemoryBtn: document.getElementById("clearMemoryBtn"),
      message: document.getElementById("message"),
      summary: document.getElementById("summary"),
      board: document.getElementById("board"),
      footer: document.getElementById("footer")
    };

    showMessage("info", "Ready.");

    function showMessage(type, text) {
      els.message.className = `message ${type}`;
      els.message.textContent = text;
    }

    async function fetchAniListWatching(userName) {
      const response = await fetch(ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({ query: QUERY, variables: { userName } })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.errors) {
        const message = data.errors?.map(err => err.message).join(" | ") || `Request failed (${response.status})`;
        throw new Error(message);
      }

      const lists = data?.data?.MediaListCollection?.lists || [];
      const entries = [];
      for (const list of lists) {
        for (const entry of list.entries || []) {
          if (entry?.media) entries.push(entry);
        }
      }
      return entries;
    }

    async function fetchTextWithOptionalProxy(url, proxyTemplate) {
      const targets = [];
      if (proxyTemplate) targets.push(proxyTemplate.replace("%URL%", encodeURIComponent(url)));
      targets.push(url);

      let lastError = null;
      for (const target of targets) {
        try {
          const response = await fetch(target, { method: "GET" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.text();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("Network request failed.");
    }

    function normalizeTitle(text) {
      return String(text || "")
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/['’`]/g, "")
        .replace(/&/g, " and ")
        .replace(/[×x]([0-9])/g, " x $1")
        .replace(/\bsecond\b/g, "2nd")
        .replace(/\bthird\b/g, "3rd")
        .replace(/\bfourth\b/g, "4th")
        .replace(/\bfirst\b/g, "1st")
        .replace(/\bseason\b/g, " s ")
        .replace(/\b2nd\b/g, " s2 ")
        .replace(/\b3rd\b/g, " s3 ")
        .replace(/\b4th\b/g, " s4 ")
        .replace(/\b5th\b/g, " s5 ")
        .replace(/\bsixth\b/g, " s6 ")
        .replace(/\bii\b/g, " 2 ")
        .replace(/\biii\b/g, " 3 ")
        .replace(/\biv\b/g, " 4 ")
        .replace(/\bvi\b/g, " 6 ")
        .replace(/\bv\b/g, " 5 ")
        .replace(/\bcour\b/g, " ")
        .replace(/\bpart\b/g, " ")
        .replace(/\bmovie\b/g, " ")
        .replace(/\bthe animation\b/g, " ")
        .replace(/\b(tv|ona|ova)\b/g, " ")
        .replace(/[\/|:;,.!?"()[\]{}\-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function compactTitle(text) {
      return normalizeTitle(text).replace(/\s+/g, "");
    }

    function stripCommonSuffixes(text) {
      return String(text || "")
        .replace(/\s*[:\-]\s*.+$/u, "")
        .replace(/\s*\([^)]*\)\s*/gu, " ")
        .replace(/\s+\b(s\d+|\d+)$|\s+season\s+\d+$/iu, "")
        .trim();
    }

    function generateVariants(values) {
      const variants = new Set();
      for (const raw of values || []) {
        if (!raw) continue;
        const text = String(raw).trim();
        if (!text) continue;

        const normalized = normalizeTitle(text);
        const compact = compactTitle(text);
        const stripped = stripCommonSuffixes(text);
        const strippedNormalized = normalizeTitle(stripped);
        const strippedCompact = compactTitle(stripped);

        [text, normalized, compact, stripped, strippedNormalized, strippedCompact].forEach(value => {
          if (value) variants.add(value);
        });

        const seasonless = normalized.replace(/\bs\d+\b/g, " ").replace(/\s+/g, " ").trim();
        const strippedSeasonless = strippedNormalized.replace(/\bs\d+\b/g, " ").replace(/\s+/g, " ").trim();
        const compactSeasonless = seasonless.replace(/\s+/g, "");
        const compactStrippedSeasonless = strippedSeasonless.replace(/\s+/g, "");
        [seasonless, strippedSeasonless, compactSeasonless, compactStrippedSeasonless].forEach(value => {
          if (value) variants.add(value);
        });
      }
      return Array.from(variants).filter(Boolean);
    }

    function extractSeasonNumber(text) {
      const normalized = normalizeTitle(text);
      const match = normalized.match(/\bs(\d+)\b|\bseason\s*(\d+)\b/);
      const number = match ? Number(match[1] || match[2]) : null;
      return Number.isFinite(number) ? number : null;
    }

    function tokens(text) {
      return new Set(normalizeTitle(text).split(" ").filter(token => token && !TITLE_STOPWORDS.has(token)));
    }

    function distinctiveTokens(text) {
      return Array.from(tokens(text)).filter(token => token.length >= 4);
    }

    function titleVariants(media) {
      const seedTitles = [
        media?.title?.userPreferred,
        media?.title?.english,
        media?.title?.romaji,
        media?.title?.native,
        ...(media?.synonyms || [])
      ];
      const variants = new Set(generateVariants(seedTitles));
      const override = MATCH_OVERRIDES[media?.title?.userPreferred] || MATCH_OVERRIDES[media?.title?.english] || MATCH_OVERRIDES[media?.title?.romaji] || null;
      if (override) generateVariants([override]).forEach(value => variants.add(value));
      return Array.from(variants).filter(Boolean);
    }

    function scoreMatch(candidate, variants) {
      if (!candidate || !Array.isArray(candidate.variants)) return 0;

      let best = 0;
      for (const variant of variants) {
        const normalized = normalizeTitle(variant);
        const compact = compactTitle(variant);
        if (!normalized) continue;

        for (const candidateVariant of candidate.variants) {
          const candidateNormalized = normalizeTitle(candidateVariant);
          const candidateCompact = compactTitle(candidateVariant);
          if (!candidateNormalized) continue;

          const variantSeason = extractSeasonNumber(normalized);
          const candidateSeason = extractSeasonNumber(candidateNormalized);
          const seasonPenalty = (variantSeason !== null && candidateSeason !== null && variantSeason !== candidateSeason) ? 5 : 0;

          if (candidateNormalized === normalized) {
            best = Math.max(best, 100 - seasonPenalty);
            continue;
          }
          if (candidateCompact && compact && candidateCompact === compact) {
            best = Math.max(best, 98 - seasonPenalty);
            continue;
          }

          if (candidateNormalized.includes(normalized) || normalized.includes(candidateNormalized)) {
            if (Math.min(candidateNormalized.length, normalized.length) >= 6) {
              best = Math.max(best, 92 - seasonPenalty);
            }
          }

          const a = tokens(candidateNormalized);
          const b = tokens(normalized);
          const overlapTokens = [...a].filter(token => b.has(token));
          const overlap = overlapTokens.length;
          const union = new Set([...a, ...b]).size || 1;
          const ratio = overlap / union;

          if (overlap >= 2 && ratio >= 0.70) best = Math.max(best, 90 - seasonPenalty);
          else if (overlap >= 2 && ratio >= 0.50) best = Math.max(best, 84 - seasonPenalty);
          else if (overlap >= 2 && ratio >= 0.34) best = Math.max(best, 78 - seasonPenalty);

          const candidateDistinctive = distinctiveTokens(candidateNormalized);
          const variantDistinctive = distinctiveTokens(normalized);
          const distinctiveOverlap = candidateDistinctive.filter(token => variantDistinctive.includes(token));

          if (distinctiveOverlap.length >= 2) {
            best = Math.max(best, 86 - seasonPenalty);
          } else if (distinctiveOverlap.length === 1) {
            const token = distinctiveOverlap[0];
            const longEnough = token.length >= 6;
            const compactNear = candidateCompact.includes(token) && compact.includes(token);
            const shortTitle = Math.min(candidateDistinctive.length, variantDistinctive.length) <= 2;
            if (longEnough && (compactNear || shortTitle)) {
              best = Math.max(best, 74 - seasonPenalty);
            }
          }
        }
      }
      return best;
    }


    function parseManualScheduleText(text) {
      const lines = String(text || "").split(/\r?\n/);
      const schedule = {};
      let currentDay = null;
      const errors = [];

      for (const day of WEEKDAYS) schedule[day] = [];

      for (let i = 0; i < lines.length; i += 1) {
        const raw = lines[i];
        const line = raw.trim();
        if (!line) continue;

        if (WEEKDAYS.includes(line)) {
          currentDay = line;
          continue;
        }

        if (!currentDay) {
          errors.push(`Line ${i + 1} is not under a weekday: "${raw}"`);
          continue;
        }

        const match = raw.match(/^(.*?)\s+(\d{1,2}:\d{2})\s*$/);
        if (!match) {
          errors.push(`Could not parse line ${i + 1}: "${raw}"`);
          continue;
        }

        const title = match[1].trim();
        const time = match[2].padStart(5, "0");
        if (!title) {
          errors.push(`Missing title on line ${i + 1}.`);
          continue;
        }

        schedule[currentDay].push({
          title,
          time
        });
      }

      return {
        schedule,
        errors,
        total: Object.values(schedule).reduce((sum, items) => sum + items.length, 0)
      };
    }

    function manualScheduleCandidates(schedule) {
      const candidates = [];
      for (const [day, items] of Object.entries(schedule || {})) {
        for (const item of items) {
          const fakeDate = new Date(`2026-01-06T${String(item.time).padStart(5, "0")}:00Z`);
          candidates.push({
            title: item.title,
            variants: generateVariants([item.title]),
            items: [{ date: fakeDate }],
            manualDay: day,
            manualTime: item.time
          });
        }
      }
      return candidates;
    }

    function parseReleaseTitle(rawTitle) {
      const text = String(rawTitle || "").trim();
      if (!text) return null;
      const cleaned = text.replace(/^\[[^\]]+\]\s*/, "").trim();
      if (/batch/i.test(cleaned)) return null;

      const match = cleaned.match(/^(.*?)\s*-\s*([0-9]+(?:\.[0-9]+)?(?:v\d+)?(?:\s*-\s*[0-9]+(?:\.[0-9]+)?(?:v\d+)?)?)\s*(?:\([^)]+\))?/i);
      if (!match) return null;

      const showTitle = match[1].trim();
      const episodeToken = match[2].replace(/\s+/g, "");
      if (!showTitle || !episodeToken || episodeToken.includes("-")) return null;
      return { showTitle, episode: episodeToken };
    }

    function parseXmlFeed(xmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, "text/xml");
      if (doc.querySelector("parsererror")) throw new Error("Feed could not be parsed as XML.");

      const rawItems = Array.from(doc.querySelectorAll("item")).map(item => ({
        title: item.querySelector("title")?.textContent?.trim() || "",
        pubDate: item.querySelector("pubDate")?.textContent?.trim() || ""
      }));

      const deduped = new Map();
      for (const item of rawItems) {
        const parsed = parseReleaseTitle(item.title);
        if (!parsed) continue;
        const date = new Date(item.pubDate);
        if (Number.isNaN(date.getTime())) continue;

        const key = `${normalizeTitle(parsed.showTitle)}::${parsed.episode}`;
        const existing = deduped.get(key);
        if (!existing || date.getTime() > existing.date.getTime()) {
          deduped.set(key, { rawTitle: item.title, showTitle: parsed.showTitle, episode: parsed.episode, date });
        }
      }

      const grouped = new Map();
      for (const value of deduped.values()) {
        if (!grouped.has(value.showTitle)) grouped.set(value.showTitle, []);
        grouped.get(value.showTitle).push(value);
      }

      return Array.from(grouped.entries()).map(([title, items]) => ({
        title,
        variants: generateVariants([title]),
        items: items.sort((a, b) => b.date.getTime() - a.date.getTime())
      }));
    }

    function parseGenericFeed(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      return parseXmlFeed(trimmed);
    }

    function dateToWeekdayTime(date, timeZone) {
      const weekday = new Intl.DateTimeFormat("en-US", { weekday: "long", timeZone }).format(date);
      const time = new Intl.DateTimeFormat("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone }).format(date);
      return { weekday, time };
    }

    function toMinutes(hhmm) {
      const [h, m] = String(hhmm).split(":").map(Number);
      return (h * 60) + m;
    }

    function minutesToHHMM(total) {
      const h = Math.floor(total / 60) % 24;
      const m = Math.round(total % 60);
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function median(values) {
      const sorted = [...values].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      if (!sorted.length) return null;
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function inferSlotFromReleases(releases, timeZone) {
      if (releases?.[0]?.manualDay && releases?.[0]?.manualTime) {
        return { day: releases[0].manualDay, time: releases[0].manualTime, sampleCount: 1 };
      }

      const sample = releases.slice(0, 3).map(item => {
        const { weekday, time } = dateToWeekdayTime(item.date, timeZone);
        return { weekday, time, minutes: toMinutes(time) };
      });
      if (!sample.length) return null;

      const counts = new Map();
      sample.forEach(item => counts.set(item.weekday, (counts.get(item.weekday) || 0) + 1));

      let chosenDay = sample[0].weekday;
      let bestCount = counts.get(chosenDay) || 0;
      for (const [day, count] of counts.entries()) {
        if (count > bestCount) {
          bestCount = count;
          chosenDay = day;
        }
      }

      const dayItems = sample.filter(item => item.weekday === chosenDay);
      const timeItems = dayItems.length ? dayItems : sample;
      const chosenMinutes = median(timeItems.map(item => item.minutes));
      return { day: chosenDay, time: minutesToHHMM(chosenMinutes ?? sample[0].minutes), sampleCount: sample.length };
    }

    function getAniListWeekdayAndTime(unixSeconds, timeZone) {
      const date = new Date(unixSeconds * 1000);
      return dateToWeekdayTime(date, timeZone);
    }

    function tryMatchCandidateSet(media, candidates, timeZone, sourceName) {
      const variants = titleVariants(media);
      const safeCandidates = Array.isArray(candidates) ? candidates : [];
      let best = null;
      let bestScore = 0;
      for (const candidate of safeCandidates) {
        const score = scoreMatch(candidate, variants);
        if (score > bestScore) {
          best = candidate;
          bestScore = score;
        }
      }
      if (!best || bestScore < 70 || !best.items.length) return null;

      const slot = inferSlotFromReleases(best.items, timeZone);
      if (!slot) return null;

      return {
        day: slot.day,
        time: slot.time,
        source: sourceName,
        sampleCount: slot.sampleCount || 1,
        matchedTitle: best.title
      };
    }

    function loadSlotCache() {
      try {
        const raw = localStorage.getItem(SLOT_CACHE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (_) {
        return {};
      }
    }

    function saveSlotCache(cache) {
      try {
        localStorage.setItem(SLOT_CACHE_KEY, JSON.stringify(cache));
      } catch (_) {}
    }

    function clearSlotCache() {
      try { localStorage.removeItem(SLOT_CACHE_KEY); } catch (_) {}
    }

    function buildItems(entries, manualCandidates, primaryCandidates, timeZone) {
      const items = [];
      for (const entry of entries) {
        const media = entry.media;
        const title =
          media?.title?.userPreferred ||
          media?.title?.english ||
          media?.title?.romaji ||
          media?.title?.native ||
          "Untitled";
        const cover = media?.coverImage?.large || media?.coverImage?.medium || "";

        const manual = tryMatchCandidateSet(media, manualCandidates, timeZone, "manual");
        const primary = manual ? null : tryMatchCandidateSet(media, primaryCandidates, timeZone, "rss");

        if (manual || primary) {
          const chosen = manual || primary;
          items.push({
            id: media.id,
            title,
            siteUrl: media.siteUrl || "#",
            cover,
            day: chosen.day,
            time: chosen.time,
            format: media.format || "",
            source: chosen.source,
            sampleCount: chosen.sampleCount || 1,
            matchedTitle: chosen.matchedTitle || ""
          });
          continue;
        }

        const next = media?.nextAiringEpisode;
        if (next?.airingAt) {
          const { weekday, time } = getAniListWeekdayAndTime(next.airingAt, timeZone);
          items.push({
            id: media.id,
            title,
            siteUrl: media.siteUrl || "#",
            cover,
            day: weekday,
            time,
            format: media.format || "",
            source: "fallback",
            sampleCount: 0,
            matchedTitle: ""
          });
        }
      }
      return items;
    }

    function applyCache(items) {
      const cache = loadSlotCache();
      const output = [];

      for (const item of items) {
        const key = String(item.id);

        if (item.source === "manual" || item.source === "rss") {
          cache[key] = {
            day: item.day,
            time: item.time,
            sampleCount: item.sampleCount || 1,
            matchedTitle: item.matchedTitle || "",
            origin: item.source,
            updatedAt: new Date().toISOString()
          };
          output.push(item);
          continue;
        }

        const remembered = cache[key];
        if (remembered && remembered.day && remembered.time) {
          output.push({
            ...item,
            day: remembered.day,
            time: remembered.time,
            source: "cache",
            sampleCount: remembered.sampleCount || 1,
            matchedTitle: remembered.matchedTitle || "",
            cacheOrigin: remembered.origin || "saved"
          });
        } else {
          output.push(item);
        }
      }

      saveSlotCache(cache);
      return output;
    }

    function sortByTime(a, b) {
      return toMinutes(a.time) - toMinutes(b.time) || a.title.localeCompare(b.title);
    }

    function to12Hour(hhmm) {
      const [hRaw, m] = String(hhmm).split(":").map(Number);
      const suffix = hRaw >= 12 ? "PM" : "AM";
      const h = ((hRaw + 11) % 12) + 1;
      return `${h}:${String(m).padStart(2, "0")} ${suffix}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function groupForBoard(items) {
      const grouped = new Map();
      for (const day of WEEKDAYS) grouped.set(day, new Map());

      for (const item of items) {
        if (!grouped.has(item.day)) grouped.set(item.day, new Map());
        const dayMap = grouped.get(item.day);
        if (!dayMap.has(item.time)) dayMap.set(item.time, []);
        dayMap.get(item.time).push(item);
      }

      const output = [];
      for (const day of WEEKDAYS) {
        const dayMap = grouped.get(day);
        const slots = Array.from(dayMap.entries())
          .map(([time, list]) => ({ time, items: list.sort(sortByTime) }))
          .sort((a, b) => toMinutes(a.time) - toMinutes(b.time));

        if (slots.length) output.push({ day, slots });
      }
      return output;
    }

    function renderSummary(items, primaryCount) {
      const manualCount = items.filter(item => item.source === "manual").length;
      const rssCount = items.filter(item => item.source === "rss").length;
      const cacheCount = items.filter(item => item.source === "cache").length;
      const fallbackCount = items.filter(item => item.source === "fallback").length;

      const cards = [
        { label: "Visible", value: String(items.length) },
        { label: "Manual", value: String(manualCount) },
        { label: "SubsPlease RSS", value: String(rssCount) },
        { label: "Memory", value: String(cacheCount) },
        { label: "Fallback", value: String(fallbackCount) },
        { label: "Parsed RSS", value: String(primaryCount) }
      ];

      els.summary.innerHTML = cards.map(card => `
        <article class="panel summary-card">
          <div class="summary-label">${escapeHtml(card.label)}</div>
          <div class="summary-value">${escapeHtml(card.value)}</div>
        </article>
      `).join("");
    }

    function renderBoard(items) {
      const grouped = groupForBoard(items);

      els.board.innerHTML = grouped.map(dayBlock => `
        <section class="panel day-column">
          <div class="day-head">
            <div class="day-name">${escapeHtml(dayBlock.day)}</div>
            <div class="day-count">${dayBlock.slots.reduce((sum, slot) => sum + slot.items.length, 0)}</div>
          </div>

          ${dayBlock.slots.map(slot => `
            <div class="time-group">
              <div class="time-pill">${escapeHtml(slot.time)} <span style="opacity:.7;">${escapeHtml(to12Hour(slot.time))}</span></div>
              <div class="entry-list">
                ${slot.items.map(item => `
                  <article class="entry">
                    <div class="thumb">
                      ${item.cover ? `<img src="${escapeHtml(item.cover)}" alt="">` : ""}
                    </div>
                    <div class="entry-body">
                      <div class="entry-title">
                        <a href="${escapeHtml(item.siteUrl)}" target="_blank" rel="noreferrer">${escapeHtml(item.title)}</a>
                      </div>
                      <div class="entry-meta">
                        ${item.format ? `<span class="chip">${escapeHtml(item.format)}</span>` : ""}
                        ${item.source === "manual"
                          ? `<span class="chip rss">Manual</span>`
                          : item.source === "rss"
                            ? `<span class="chip rss">RSS · ${item.sampleCount || 1}</span>`
                            : item.source === "cache"
                              ? `<span class="chip cache">Memory · ${escapeHtml(item.cacheOrigin || "saved")}</span>`
                              : `<span class="chip fallback">AniList</span>`}
                      </div>
                    </div>
                  </article>
                `).join("")}
              </div>
            </div>
          `).join("")}
        </section>
      `).join("");

      if (!grouped.length) {
        els.board.innerHTML = `<section class="panel day-column"><div class="day-name">No current airing slots found.</div></section>`;
      }
    }

    async function loadBoard() {
      const userName = els.username.value.trim();
      const timeZone = DEFAULT_TIMEZONE;

      if (!userName) {
        showMessage("error", "Please enter a username.");
        return;
      }

      els.loadBtn.disabled = true;
      showMessage("info", "Loading…");

      try {
        const entries = await fetchAniListWatching(userName);

        const primaryResult = await fetchTextWithOptionalProxy(
          els.rssUrl.value.trim(),
          els.rssProxyTemplate.value.trim()
        );

        let primaryCandidates = [];
        const notes = [];

        const manualResult = parseManualScheduleText(els.manualScheduleText.value);
        const manualCandidates = manualScheduleCandidates(manualResult.schedule);
        if (manualResult.errors.length) {
          notes.push(`Manual schedule: ${manualResult.errors.join(" ")}`);
        }

        if (primaryResult.trim()) {
          try {
            primaryCandidates = parseGenericFeed(primaryResult);
          } catch (error) {
            notes.push(`SubsPlease: ${error.message}`);
          }
        }

        const built = buildItems(entries, manualCandidates, primaryCandidates, timeZone);
        const items = applyCache(built).sort((a, b) => WEEKDAYS.indexOf(a.day) - WEEKDAYS.indexOf(b.day) || sortByTime(a, b));

        renderSummary(items, primaryCandidates.length);
        renderBoard(items);

        els.footer.textContent =
          `${items.length} visible. ${items.filter(item => item.source === "rss").length} RSS, ` +
          `${items.filter(item => item.source === "cache").length} memory, ` +
          `${items.filter(item => item.source === "fallback").length} fallback.` +
          (notes.length ? ` ${notes.join(" ")}` : "");

        showMessage("info", `Loaded ${entries.length} AniList entries.${notes.length ? `\n\n${notes.join("\n")}` : ""}`);
      } catch (error) {
        els.summary.innerHTML = "";
        els.board.innerHTML = "";
        els.footer.textContent = "";
        showMessage("error", `Could not load the board: ${error.message}`);
      } finally {
        els.loadBtn.disabled = false;
      }
    }

    els.loadBtn.addEventListener("click", loadBoard);
    els.clearMemoryBtn.addEventListener("click", () => {
      clearSlotCache();
      showMessage("info", "Memory cleared.");
    });

    els.username.addEventListener("keydown", event => { if (event.key === "Enter") loadBoard(); });
    els.rssUrl.addEventListener("keydown", event => { if (event.key === "Enter") loadBoard(); });
    els.rssProxyTemplate.addEventListener("keydown", event => { if (event.key === "Enter") loadBoard(); });
  </script>
</body>
