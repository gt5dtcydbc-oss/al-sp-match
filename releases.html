<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AniList Releases Board</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #f9fafc;
      --text: #151923;
      --muted: #697184;
      --muted-2: #8b94a7;
      --line: #e4e7ef;
      --brand: #5f6df5;
      --brand-strong: #4253ee;
      --ok: #1b9a69;
      --warn: #b7791f;
      --danger: #c2413a;
      --shadow: 0 18px 50px rgba(22, 29, 50, 0.08);
      --radius: 22px;
      --radius-sm: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(95, 109, 245, 0.12), transparent 34rem),
        radial-gradient(circle at top right, rgba(27, 154, 105, 0.08), transparent 30rem),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .shell {
      display: grid;
      gap: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4rem);
      letter-spacing: -0.06em;
      line-height: 0.96;
    }

    .subhead {
      margin: 14px 0 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 1rem;
    }

    .toolbar,
    .search-card,
    .board,
    .toast {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(228, 231, 239, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: calc(var(--radius) + 6px);
    }

    .toolbar-left,
    .toolbar-right,
    .import-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(27, 154, 105, 0.12);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 800;
      transition: 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #cfd5e5;
    }

    .btn.primary {
      background: var(--brand);
      color: white;
      border-color: transparent;
      box-shadow: 0 12px 28px rgba(95, 109, 245, 0.28);
    }

    .btn.primary:hover {
      background: var(--brand-strong);
    }

    .btn.danger {
      color: var(--danger);
    }

    .btn.icon {
      width: 40px;
      padding: 0;
    }

    .file-input {
      display: none;
    }

    .search-card {
      position: relative;
      padding: 14px;
      border-radius: calc(var(--radius) + 8px);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .search-input {
      width: 100%;
      min-height: 52px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text);
      outline: none;
      transition: 160ms ease;
      font-size: 1rem;
    }

    .search-input:focus {
      border-color: rgba(95, 109, 245, 0.65);
      box-shadow: 0 0 0 4px rgba(95, 109, 245, 0.12);
      background: #fff;
    }

    .results {
      display: none;
      position: absolute;
      z-index: 20;
      left: 14px;
      right: 14px;
      top: calc(100% - 6px);
      max-height: 440px;
      overflow: auto;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 70px rgba(22, 29, 50, 0.16);
    }

    .results.open {
      display: grid;
      gap: 6px;
    }

    .result-item {
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 10px;
      text-align: left;
      background: transparent;
      border-radius: 16px;
      color: var(--text);
    }

    .result-item:hover {
      background: var(--surface-soft);
    }

    .poster {
      width: 46px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, #dfe4f4, #f5f6fa);
      border: 1px solid var(--line);
    }

    .result-title,
    .card-title {
      font-weight: 900;
      line-height: 1.2;
    }

    .result-meta,
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.found {
      color: var(--ok);
      background: rgba(27, 154, 105, 0.08);
      border-color: rgba(27, 154, 105, 0.18);
    }

    .badge.watching {
      color: var(--warn);
      background: rgba(183, 121, 31, 0.08);
      border-color: rgba(183, 121, 31, 0.2);
    }

    .badge.downloaded {
      color: var(--brand-strong);
      background: rgba(95, 109, 245, 0.09);
      border-color: rgba(95, 109, 245, 0.18);
    }

    .boards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .board {
      min-height: 280px;
      border-radius: calc(var(--radius) + 4px);
      padding: 14px;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      padding: 2px 2px 10px;
      border-bottom: 1px solid var(--line);
    }

    .board-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .count {
      min-width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .collapse-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 900;
      transition: 160ms ease;
    }

    .collapse-btn:hover {
      color: var(--text);
      border-color: #cfd5e5;
    }

    .board-list {
      display: grid;
      gap: 10px;
    }

    .board.collapsed .board-list {
      display: none;
    }

    .board.collapsed {
      min-height: auto;
    }

    .show-card {
      overflow: hidden;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(22, 29, 50, 0.06);
    }

    .card-main {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: start;
      gap: 10px;
      padding: 12px;
    }

    .download-check {
      width: 22px;
      height: 22px;
      margin: 2px 0 0;
      accent-color: var(--brand);
      cursor: pointer;
    }

    .card-content {
      min-width: 0;
    }

    .card-title {
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notes-toggle {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .notes-toggle[aria-expanded="true"] {
      color: var(--brand-strong);
      border-color: rgba(95, 109, 245, 0.25);
      background: rgba(95, 109, 245, 0.08);
    }

    .remove-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      color: var(--muted-2);
      background: transparent;
      font-weight: 900;
    }

    .remove-btn:hover {
      color: var(--danger);
      background: rgba(194, 65, 58, 0.08);
    }

    .notes-panel {
      display: none;
      padding: 0 12px 12px;
    }

    .show-card.notes-open .notes-panel {
      display: block;
    }

    .notes-panel textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      background: var(--surface-soft);
      color: var(--text);
      line-height: 1.4;
    }

    .notes-panel textarea:focus {
      border-color: rgba(95, 109, 245, 0.65);
      box-shadow: 0 0 0 4px rgba(95, 109, 245, 0.10);
      background: #fff;
    }

    .empty {
      padding: 22px 14px;
      border: 1px dashed #d5dbea;
      border-radius: 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(249, 250, 252, 0.62);
      line-height: 1.45;
      font-weight: 650;
    }

    .toast-area {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 60;
      display: grid;
      gap: 10px;
      width: min(420px, calc(100vw - 36px));
    }

    .toast {
      padding: 14px 16px;
      border-radius: 18px;
      color: var(--text);
      font-weight: 750;
      line-height: 1.4;
    }

    .toast.error {
      border-color: rgba(194, 65, 58, 0.24);
    }

    .kbd {
      padding: 2px 6px;
      border-radius: 7px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
    }

    @media (max-width: 1040px) {
      .boards {
        grid-template-columns: 1fr;
      }

      .board {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 18px, 1440px);
        padding-top: 18px;
      }

      .hero,
      .search-row {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar-left,
      .toolbar-right,
      .import-wrap {
        width: 100%;
      }

      .toolbar .btn,
      .import-wrap .btn {
        flex: 1;
      }

      .result-item {
        grid-template-columns: 42px 1fr;
      }

      .result-item .badge {
        grid-column: 2;
        width: max-content;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AniList × releases.moe</p>
          <h1>Release Board</h1>
          <p class="subhead">
            Add anime from AniList, then let the board sort them by whether releases.moe has an entry.
            Downloaded items stay tucked away until you need them.
          </p>
        </div>
      </header>

      <section class="toolbar" aria-label="Board tools">
        <div class="toolbar-left">
          <span class="status-pill"><span class="dot" aria-hidden="true"></span><span id="statusText">Ready</span></span>
          <button class="btn" id="checkAllBtn" type="button">Check status</button>
        </div>
        <div class="toolbar-right">
          <button class="btn" id="exportBtn" type="button">Export JSON</button>
          <div class="import-wrap">
            <input class="file-input" id="importFile" type="file" accept="application/json,.json" />
            <button class="btn" id="importBtn" type="button">Import JSON</button>
          </div>
          <button class="btn danger" id="clearBtn" type="button">Clear</button>
        </div>
      </section>

      <section class="search-card" aria-label="Search AniList">
        <div class="search-row">
          <input
            class="search-input"
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="Search AniList, e.g. Cowboy Bebop"
            aria-label="Search AniList for anime"
          />
          <button class="btn primary" id="searchBtn" type="button">Search</button>
        </div>
        <div class="results" id="results" role="listbox" aria-label="AniList search results"></div>
      </section>

      <section class="boards" aria-label="Release boards">
        <article class="board" data-board="found">
          <header class="board-header">
            <h2 class="board-title">Found <span class="count" id="foundCount">0</span></h2>
          </header>
          <div class="board-list" id="foundList"></div>
        </article>

        <article class="board" data-board="watching">
          <header class="board-header">
            <h2 class="board-title">Watching <span class="count" id="watchingCount">0</span></h2>
          </header>
          <div class="board-list" id="watchingList"></div>
        </article>

        <article class="board" data-board="downloaded" id="downloadedBoard">
          <header class="board-header">
            <h2 class="board-title">Downloaded <span class="count" id="downloadedCount">0</span></h2>
            <button class="collapse-btn" id="toggleDownloadedBtn" type="button" aria-expanded="true" title="Collapse Downloaded">⌄</button>
          </header>
          <div class="board-list" id="downloadedList"></div>
        </article>
      </section>
    </section>
  </main>

  <div class="toast-area" id="toastArea" aria-live="polite" aria-atomic="true"></div>

  <script>
    const ANILIST_ENDPOINT = "https://graphql.anilist.co";
    const RELEASES_ENDPOINT = "https://releases.moe/api/collections/entries/records";
    const STORAGE_KEY = "anilist-releases-board:v1";

    const state = {
      shows: [],
      ui: {
        downloadedCollapsed: false,
        openNotes: {}
      }
    };

    const els = {
      statusText: document.querySelector("#statusText"),
      searchInput: document.querySelector("#searchInput"),
      searchBtn: document.querySelector("#searchBtn"),
      results: document.querySelector("#results"),
      checkAllBtn: document.querySelector("#checkAllBtn"),
      exportBtn: document.querySelector("#exportBtn"),
      importBtn: document.querySelector("#importBtn"),
      importFile: document.querySelector("#importFile"),
      clearBtn: document.querySelector("#clearBtn"),
      foundList: document.querySelector("#foundList"),
      watchingList: document.querySelector("#watchingList"),
      downloadedList: document.querySelector("#downloadedList"),
      foundCount: document.querySelector("#foundCount"),
      watchingCount: document.querySelector("#watchingCount"),
      downloadedCount: document.querySelector("#downloadedCount"),
      downloadedBoard: document.querySelector("#downloadedBoard"),
      toggleDownloadedBtn: document.querySelector("#toggleDownloadedBtn"),
      toastArea: document.querySelector("#toastArea")
    };

    const boardCopy = {
      found: "Found",
      watching: "Watching",
      downloaded: "Downloaded"
    };

    const emptyCopy = {
      found: "No matched releases yet.",
      watching: "No shows waiting for releases.",
      downloaded: "Nothing downloaded yet."
    };

    init();

    function init() {
      loadState();
      bindEvents();
      render();
      checkAllStatuses({ silent: true });
    }

    function bindEvents() {
      els.searchBtn.addEventListener("click", () => runSearch());
      els.searchInput.addEventListener("input", debounce(() => runSearch(), 350));
      els.searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeResults();
        if (event.key === "Enter") runSearch();
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".search-card")) closeResults();
      });

      els.checkAllBtn.addEventListener("click", () => checkAllStatuses({ silent: false }));
      els.exportBtn.addEventListener("click", exportJson);
      els.importBtn.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", importJson);
      els.clearBtn.addEventListener("click", clearBoard);
      els.toggleDownloadedBtn.addEventListener("click", toggleDownloaded);
    }

    async function runSearch() {
      const search = els.searchInput.value.trim();

      if (!search) {
        closeResults();
        return;
      }

      setStatus("Searching AniList…");
      els.results.classList.add("open");
      els.results.innerHTML = '<div class="empty">Searching…</div>';

      try {
        const results = await searchAniList(search);
        renderResults(results);
        setStatus("Ready");
      } catch (error) {
        console.error(error);
        els.results.innerHTML = '<div class="empty">AniList search failed. Try again in a moment.</div>';
        setStatus("Search failed");
        toast("Could not search AniList. The API may be rate-limiting requests or unavailable.", "error");
      }
    }

    async function searchAniList(search) {
      const query = `
        query SearchAnime($search: String, $page: Int, $perPage: Int) {
          Page(page: $page, perPage: $perPage) {
            media(search: $search, type: ANIME, sort: SEARCH_MATCH) {
              id
              title { romaji english native }
              coverImage { medium large }
              episodes
              format
              status
              seasonYear
              siteUrl
            }
          }
        }
      `;

      const response = await fetch(ANILIST_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          query,
          variables: { search, page: 1, perPage: 8 }
        })
      });

      if (!response.ok) throw new Error(`AniList returned ${response.status}`);
      const json = await response.json();
      return json?.data?.Page?.media ?? [];
    }

    function renderResults(results) {
      if (!results.length) {
        els.results.innerHTML = '<div class="empty">No AniList results found.</div>';
        return;
      }

      els.results.innerHTML = results.map((media) => {
        const title = getTitle(media.title);
        const alreadyAdded = state.shows.some((show) => show.anilistId === media.id);
        const meta = [media.format, media.seasonYear, media.episodes ? `${media.episodes} ep` : null]
          .filter(Boolean)
          .map(escapeHtml)
          .join(" · ");

        return `
          <button class="result-item" type="button" data-add-id="${media.id}" ${alreadyAdded ? "disabled" : ""}>
            <img class="poster" src="${media.coverImage?.medium ?? ""}" alt="" loading="lazy" />
            <span>
              <span class="result-title">${escapeHtml(title)}</span>
              <span class="result-meta">${meta || "Anime"}</span>
            </span>
            <span class="badge">${alreadyAdded ? "Added" : "Add"}</span>
          </button>
        `;
      }).join("");

      els.results.querySelectorAll("[data-add-id]").forEach((button) => {
        button.addEventListener("click", async () => {
          const media = results.find((item) => item.id === Number(button.dataset.addId));
          if (media) await addShow(media);
        });
      });
    }

    async function addShow(media) {
      if (state.shows.some((show) => show.anilistId === media.id)) {
        toast("That show is already on your board.");
        return;
      }

      closeResults();
      els.searchInput.value = "";
      setStatus("Checking releases.moe…");

      const show = {
        id: crypto.randomUUID ? crypto.randomUUID() : `show-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        anilistId: media.id,
        title: getTitle(media.title),
        titleEnglish: media.title?.english ?? "",
        titleRomaji: media.title?.romaji ?? "",
        coverImage: media.coverImage?.medium || media.coverImage?.large || "",
        format: media.format ?? "",
        episodes: media.episodes ?? null,
        seasonYear: media.seasonYear ?? null,
        siteUrl: media.siteUrl ?? `https://anilist.co/anime/${media.id}`,
        board: "watching",
        downloaded: false,
        comments: "",
        releasesMoe: {
          found: false,
          recordId: null,
          checkedAt: null,
          error: null
        },
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      state.shows.unshift(show);
      render();
      saveState();

      await refreshShowStatus(show, { forceMove: true });
      render();
      saveState();
      setStatus("Ready");
      toast(`${show.title} added to ${boardCopy[show.board]}.`);
    }

    async function checkAllStatuses({ silent = false } = {}) {
      const candidates = state.shows.filter((show) => !show.downloaded);
      if (!candidates.length) {
        if (!silent) toast("No non-downloaded shows to check.");
        return;
      }

      setStatus(`Checking ${candidates.length} show${candidates.length === 1 ? "" : "s"}…`);

      for (const show of candidates) {
        await refreshShowStatus(show, { forceMove: true });
        render();
        saveState();
      }

      setStatus("Ready");
      if (!silent) toast("Status check complete.");
    }

    async function refreshShowStatus(show, { forceMove = false } = {}) {
      try {
        const match = await getReleaseEntry(show.anilistId);
        show.releasesMoe = {
          found: Boolean(match),
          recordId: match?.id ?? null,
          checkedAt: new Date().toISOString(),
          error: null
        };

        if (!show.downloaded && forceMove) {
          show.board = match ? "found" : "watching";
        }

        show.updatedAt = new Date().toISOString();
      } catch (error) {
        console.error(error);
        show.releasesMoe = {
          ...(show.releasesMoe || {}),
          checkedAt: new Date().toISOString(),
          error: error.message || "Unknown error"
        };
      }
    }

    async function getReleaseEntry(anilistId) {
      const params = new URLSearchParams({
        perPage: "1",
        filter: `alID=${Number(anilistId)}`
      });

      const response = await fetch(`${RELEASES_ENDPOINT}?${params.toString()}`);
      if (!response.ok) throw new Error(`releases.moe returned ${response.status}`);

      const json = await response.json();
      return json?.items?.[0] ?? null;
    }

    function render() {
      applyDownloadedCollapse();
      const byBoard = {
        found: state.shows.filter((show) => show.board === "found" && !show.downloaded),
        watching: state.shows.filter((show) => show.board === "watching" && !show.downloaded),
        downloaded: state.shows.filter((show) => show.downloaded || show.board === "downloaded")
      };

      renderBoard("found", byBoard.found, els.foundList, els.foundCount);
      renderBoard("watching", byBoard.watching, els.watchingList, els.watchingCount);
      renderBoard("downloaded", byBoard.downloaded, els.downloadedList, els.downloadedCount);
    }

    function renderBoard(board, shows, listEl, countEl) {
      countEl.textContent = shows.length;

      if (!shows.length) {
        listEl.innerHTML = `<div class="empty">${emptyCopy[board]}</div>`;
        return;
      }

      listEl.innerHTML = shows.map(renderShowCard).join("");

      listEl.querySelectorAll("[data-download-id]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => toggleDownloadedStatus(checkbox.dataset.downloadId, checkbox.checked));
      });

      listEl.querySelectorAll("[data-notes-id]").forEach((button) => {
        button.addEventListener("click", () => toggleNotes(button.dataset.notesId));
      });

      listEl.querySelectorAll("[data-remove-id]").forEach((button) => {
        button.addEventListener("click", () => removeShow(button.dataset.removeId));
      });

      listEl.querySelectorAll("[data-comment-id]").forEach((textarea) => {
        textarea.addEventListener("input", debounce(() => updateComments(textarea.dataset.commentId, textarea.value), 180));
      });
    }

    function renderShowCard(show) {
      const isDownloaded = show.downloaded || show.board === "downloaded";
      const isNotesOpen = Boolean(state.ui.openNotes[show.id]);
      const releaseBadge = isDownloaded
        ? '<span class="badge downloaded">Downloaded</span>'
        : show.releasesMoe?.found
          ? '<span class="badge found">releases.moe found</span>'
          : '<span class="badge watching">Watching</span>';
      const meta = [show.format, show.seasonYear, show.episodes ? `${show.episodes} ep` : null]
        .filter(Boolean)
        .map(escapeHtml)
        .join(" · ");
      const checked = show.releasesMoe?.checkedAt
        ? `Checked ${formatDate(show.releasesMoe.checkedAt)}`
        : "Not checked yet";

      return `
        <article class="show-card ${isNotesOpen ? "notes-open" : ""}" data-show-id="${show.id}">
          <div class="card-main">
            <input class="download-check" type="checkbox" data-download-id="${show.id}" ${isDownloaded ? "checked" : ""} aria-label="Mark ${escapeAttr(show.title)} as downloaded" />
            <div class="card-content">
              <div class="card-title">${escapeHtml(show.title)}</div>
              <div class="card-meta">
                ${meta ? `<span>${meta}</span>` : ""}
                ${releaseBadge}
                <span class="badge">${escapeHtml(checked)}</span>
              </div>
            </div>
            <div class="card-actions">
              <button class="notes-toggle" type="button" data-notes-id="${show.id}" aria-expanded="${isNotesOpen}" title="Toggle comments">✎</button>
              <button class="remove-btn" type="button" data-remove-id="${show.id}" title="Remove show">×</button>
            </div>
          </div>
          <div class="notes-panel">
            <textarea data-comment-id="${show.id}" placeholder="Add small comments…">${escapeHtml(show.comments || "")}</textarea>
          </div>
        </article>
      `;
    }

    async function toggleDownloadedStatus(showId, checked) {
      const show = state.shows.find((item) => item.id === showId);
      if (!show) return;

      show.downloaded = checked;
      show.updatedAt = new Date().toISOString();

      if (checked) {
        show.previousBoard = show.board === "downloaded" ? show.previousBoard || "watching" : show.board;
        show.board = "downloaded";
        toast(`${show.title} moved to Downloaded.`);
      } else {
        show.downloaded = false;
        show.board = show.releasesMoe?.found ? "found" : "watching";
        await refreshShowStatus(show, { forceMove: true });
        toast(`${show.title} moved to ${boardCopy[show.board]}.`);
      }

      render();
      saveState();
    }

    function toggleNotes(showId) {
      state.ui.openNotes[showId] = !state.ui.openNotes[showId];
      render();
      saveState();
    }

    function updateComments(showId, comments) {
      const show = state.shows.find((item) => item.id === showId);
      if (!show) return;
      show.comments = comments;
      show.updatedAt = new Date().toISOString();
      saveState();
    }

    function removeShow(showId) {
      const show = state.shows.find((item) => item.id === showId);
      if (!show) return;

      const ok = confirm(`Remove “${show.title}” from the board?`);
      if (!ok) return;

      state.shows = state.shows.filter((item) => item.id !== showId);
      delete state.ui.openNotes[showId];
      render();
      saveState();
      toast(`${show.title} removed.`);
    }

    function exportJson() {
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        shows: state.shows,
        ui: state.ui
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `anilist-releases-board-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.append(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      toast("Board exported as JSON.");
    }

    async function importJson(event) {
      const file = event.target.files?.[0];
      event.target.value = "";
      if (!file) return;

      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        const shows = Array.isArray(payload) ? payload : payload.shows;

        if (!Array.isArray(shows)) throw new Error("JSON must contain a shows array.");

        state.shows = shows.map(normalizeImportedShow);
        state.ui = {
          downloadedCollapsed: Boolean(payload.ui?.downloadedCollapsed),
          openNotes: payload.ui?.openNotes && typeof payload.ui.openNotes === "object" ? payload.ui.openNotes : {}
        };

        render();
        saveState();
        toast("Board imported. Checking statuses now…");
        await checkAllStatuses({ silent: true });
      } catch (error) {
        console.error(error);
        toast(`Import failed: ${error.message}`, "error");
      }
    }

    function normalizeImportedShow(show) {
      const id = show.id || (crypto.randomUUID ? crypto.randomUUID() : `show-${Date.now()}-${Math.random().toString(16).slice(2)}`);
      const downloaded = Boolean(show.downloaded || show.board === "downloaded");
      const releasesMoe = show.releasesMoe && typeof show.releasesMoe === "object"
        ? show.releasesMoe
        : { found: false, recordId: null, checkedAt: null, error: null };

      return {
        id,
        anilistId: Number(show.anilistId || show.alID || show.idAnilist),
        title: String(show.title || show.titleRomaji || show.titleEnglish || "Untitled"),
        titleEnglish: String(show.titleEnglish || ""),
        titleRomaji: String(show.titleRomaji || ""),
        coverImage: String(show.coverImage || ""),
        format: String(show.format || ""),
        episodes: show.episodes ?? null,
        seasonYear: show.seasonYear ?? null,
        siteUrl: String(show.siteUrl || `https://anilist.co/anime/${show.anilistId || show.alID || ""}`),
        board: downloaded ? "downloaded" : ["found", "watching"].includes(show.board) ? show.board : releasesMoe.found ? "found" : "watching",
        downloaded,
        previousBoard: show.previousBoard || null,
        comments: String(show.comments || ""),
        releasesMoe: {
          found: Boolean(releasesMoe.found),
          recordId: releasesMoe.recordId ?? null,
          checkedAt: releasesMoe.checkedAt ?? null,
          error: releasesMoe.error ?? null
        },
        createdAt: show.createdAt || new Date().toISOString(),
        updatedAt: show.updatedAt || new Date().toISOString()
      };
    }

    function clearBoard() {
      if (!state.shows.length) return;
      const ok = confirm("Clear the whole board? Export first if you want a backup.");
      if (!ok) return;

      state.shows = [];
      state.ui.openNotes = {};
      render();
      saveState();
      toast("Board cleared.");
    }

    function toggleDownloaded() {
      state.ui.downloadedCollapsed = !state.ui.downloadedCollapsed;
      applyDownloadedCollapse();
      saveState();
    }

    function applyDownloadedCollapse() {
      els.downloadedBoard.classList.toggle("collapsed", Boolean(state.ui.downloadedCollapsed));
      els.toggleDownloadedBtn.setAttribute("aria-expanded", String(!state.ui.downloadedCollapsed));
      els.toggleDownloadedBtn.textContent = state.ui.downloadedCollapsed ? "›" : "⌄";
      els.toggleDownloadedBtn.title = state.ui.downloadedCollapsed ? "Expand Downloaded" : "Collapse Downloaded";
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;

        const saved = JSON.parse(raw);
        state.shows = Array.isArray(saved.shows) ? saved.shows.map(normalizeImportedShow) : [];
        state.ui = {
          downloadedCollapsed: Boolean(saved.ui?.downloadedCollapsed),
          openNotes: saved.ui?.openNotes && typeof saved.ui.openNotes === "object" ? saved.ui.openNotes : {}
        };
      } catch (error) {
        console.error(error);
        localStorage.removeItem(STORAGE_KEY);
        toast("Saved board data was invalid and has been reset.", "error");
      }
    }

    function closeResults() {
      els.results.classList.remove("open");
      els.results.innerHTML = "";
    }

    function setStatus(text) {
      els.statusText.textContent = text;
    }

    function toast(message, type = "") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      els.toastArea.append(el);
      window.setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(8px)";
        el.style.transition = "240ms ease";
        window.setTimeout(() => el.remove(), 260);
      }, 3200);
    }

    function getTitle(title = {}) {
      return title.english || title.romaji || title.native || "Untitled";
    }

    function formatDate(value) {
      try {
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date(value));
      } catch {
        return "recently";
      }
    }

    function debounce(fn, wait) {
      let timeout;
      return (...args) => {
        window.clearTimeout(timeout);
        timeout = window.setTimeout(() => fn(...args), wait);
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
